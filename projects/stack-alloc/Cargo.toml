cargo-features = ["profile-rustflags"]

[package]
name = "stack-alloc"
version = "0.1.0"
edition = "2024"

[dependencies]
builtins = { path = "../../builtins" }
toolkit = { path = "../../toolkit" }
ntapi = { version = "0.4.3", features = [] }
winapi = { version = "*", features = ["errhandlingapi", "minwinbase", "winbase", "libloaderapi", "synchapi"] }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
opt-level = "z"          
lto = false
codegen-units = 1        
debug = false            
debug-assertions = false 
overflow-checks = false  
incremental = false      
strip = "debuginfo"
rustflags = [
    "-C", "link-arg=/DEBUG:NONE",
    "-C", "link-arg=/EMITPOGOPHASEINFO",
    "-C", "link-arg=/Oy-",
    "-C", "link-arg=/OPT:REF",
    "-C", "link-arg=/OPT:ICF",
    "-C", "link-arg=/MERGE:.rdata=.text",
]