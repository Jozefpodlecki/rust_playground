
[package]
name = "win-veh"
version = "0.1.0"
edition = "2024"

[dependencies]
winapi = { version = "0.3.9", features = ["errhandlingapi", "minwinbase", "libloaderapi", "impl-debug"] }
ntapi = { version = "0.4.3"}
emballoc = "0.3.0"
builtins = { path = "../../builtins" }
toolkit = { path = "../../toolkit" }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
opt-level = "z"          
lto = false
codegen-units = 1        
debug = false            
debug-assertions = false 
overflow-checks = false  
incremental = false      
strip = "debuginfo"