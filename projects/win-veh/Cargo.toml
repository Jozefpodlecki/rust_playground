
[package]
name = "win-veh"
version = "0.1.0"
edition = "2024"

[dependencies]
winapi = { version = "0.3.9", features = ["errhandlingapi", "minwinbase", "libloaderapi", "synchapi"] }
ntapi = { version = "0.4.3"}
iced-x86 = "1.21.0"
utils = { path = "../../utils" }

[profile.dev]
# panic = "abort"

[profile.release]
# panic = "abort"
opt-level = "z"          
lto = false
codegen-units = 1        
debug = false            
debug-assertions = false 
overflow-checks = false  
incremental = false      
strip = "debuginfo"