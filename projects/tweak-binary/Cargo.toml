cargo-features = ["profile-rustflags"]

[package]
name = "tweak-binary"
version = "0.1.0"
edition = "2024"

[dependencies]
builtins = { path = "../../builtins" }
toolkit = { path = "../../toolkit" }
heapless = { version = "0.9.3", features = ["serde"] }
pelite = { git = "https://github.com/Jozefpodlecki/pelite", branch="fixes/no-std" }
serde = { version = "1.0.228", default-features = false, features = ["derive"] }
serde_json = { version = "1.0.150", default-features = false, features = ["alloc"] }
emballoc = "0.3.0"
hex = { version = "0.4.3", default-features = false, features = ["alloc"] }
time = { version = "0.3.53", default-features = false, features = [ "alloc" ] }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
opt-level = "z"          
lto = false
codegen-units = 1        
debug = false            
debug-assertions = false 
overflow-checks = false  
incremental = false      
strip = "debuginfo"
rustflags = [
    "-C", "link-arg=/DEBUG:NONE",
    "-C", "link-arg=/EMITPOGOPHASEINFO",
    "-C", "link-arg=/OPT:REF",
    "-C", "link-arg=/OPT:ICF",
    # "-C", "link-arg=/MERGE:.rdata=.text",
]