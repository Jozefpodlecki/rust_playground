cargo-features = ["profile-rustflags"]

[package]
name = "win-tls"
version = "0.1.0"
edition = "2024"

[dependencies]
builtins = { path = "../../builtins" }
ntapi = "0.4.3"
toolkit = { path = "../../toolkit" }
winapi = { version = "0.3.9", features = [] }
heapless = "0.9.3"
emballoc = "0.3.0"
buddyalloc = "0.1.5"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
opt-level = "z"          
lto = false
codegen-units = 1        
debug = false            
debug-assertions = false 
overflow-checks = false  
incremental = false      
strip = "debuginfo"
rustflags = [
    "-C", "link-arg=/DEBUG:NONE",
    "-C", "link-arg=/EMITPOGOPHASEINFO",
    "-C", "link-arg=/OPT:REF",
    "-C", "link-arg=/OPT:ICF",
    # "-C", "link-arg=/MERGE:.rdata=.text",
]